appId: ar.com.stockflow.desktop
productName: StockFlow
copyright: Copyright © 2026 StockFlow

directories:
  buildResources: build
  output: release

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json

extraResources:
  - from: ../../packages/db/migrations/local
    to: migrations/local
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"

mac:
  category: public.app-category.business
  hardenedRuntime: true
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64
  icon: build/icon.icns

dmg:
  background: build/dmg-background.png
  iconSize: 96
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: StockFlow

linux:
  target:
    - target: AppImage
      arch:
        - x64
  category: Office
  icon: build/icon.png

publish:
  - provider: github
    owner: stockflow-ar
    repo: stockflow-desktop
    private: true
